<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spotify Logo</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── floating particles ── */
    .particles { position:fixed; inset:0; pointer-events:none; z-index:0; }
    .dot {
      position: absolute;
      border-radius: 50%;
      background: #1DB954;
      opacity: 0;
      animation: floatDot var(--dur) ease-in-out var(--delay) infinite;
    }
    @keyframes floatDot {
      0%   { transform:translateY(0) scale(0);   opacity:0;    }
      20%  { opacity:0.35; }
      80%  { opacity:0.15; }
      100% { transform:translateY(-120px) scale(1.4); opacity:0; }
    }

    /* ── wrapper ── */
    .logo-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 36px;
      opacity: 0;
      animation: wrapFadeIn 0.4s ease 0.2s 1 forwards;
    }
    @keyframes wrapFadeIn { to { opacity:1; } }

    /* ── glow halo ── */
    .halo {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle, #1DB95455 0%, transparent 70%);
      filter: blur(22px);
      transform: scale(0);
      animation: haloIn 1s ease 0.3s 1 forwards, haloPulse 3s ease-in-out 3s infinite;
    }
    @keyframes haloIn    { to { transform:scale(1.7); } }
    @keyframes haloPulse {
      0%,100% { transform:scale(1.7); opacity:0.8; }
      50%     { transform:scale(2.1); opacity:0.4; }
    }

    /* ── pulse rings ── */
    .pulse-ring  { fill:none; stroke:#1DB954; stroke-width:2.5; opacity:0; animation: pulse 1.8s ease-out 0.5s 1 forwards; }
    .pulse-ring2 { fill:none; stroke:#1DB954; stroke-width:2;   opacity:0; animation: pulse 1.8s ease-out 0.9s 1 forwards; }
    .pulse-ring3 { fill:none; stroke:#1DB954; stroke-width:1.5; opacity:0; animation: pulse 1.8s ease-out 1.3s 1 forwards; }
    .idle-ring   { fill:none; stroke:#1DB954; stroke-width:2;   opacity:0; animation: idlePulse 4s ease-out 5s infinite; }
    .idle-ring2  { fill:none; stroke:#1DB954; stroke-width:1.5; opacity:0; animation: idlePulse 4s ease-out 6.5s infinite; }
    @keyframes pulse     { 0% { r:108px; opacity:0.6; } 100% { r:168px; opacity:0; } }
    @keyframes idlePulse { 0% { r:108px; opacity:0.4; } 100% { r:158px; opacity:0; } }

    /* ── circle spin-in ── */
    .circle-main {
      transform-origin: 100px 100px;
      transform: scale(0) rotate(-180deg);
      animation: circleIn 0.9s cubic-bezier(.34,1.56,.64,1) 0.3s 1 forwards;
    }
    @keyframes circleIn {
      0%   { transform:scale(0) rotate(-180deg); }
      100% { transform:scale(1) rotate(0deg);    }
    }

    /* ════════════════════════════════
       BARS  —  semua 3 garis TERLIHAT
       viewBox 200×200, r=100, cx=cy=100
       Garis harus berada di dalam r=100
       → y max aman: ~175 (100 + 75)
    ════════════════════════════════ */

    /* bar1: terpanjang, paling ATAS */
    .bar1 {
      stroke-dasharray: 215; stroke-dashoffset: 215;
      animation:
        drawBar  0.55s ease        1.1s  1 forwards,
        wave1    1.7s  ease-in-out 1.75s 1 forwards,
        idleWave1 3.8s ease-in-out 4.6s  infinite;
    }
    /* bar2: tengah */
    .bar2 {
      stroke-dasharray: 178; stroke-dashoffset: 178;
      animation:
        drawBar  0.55s ease        1.28s 1 forwards,
        wave2    1.7s  ease-in-out 1.75s 1 forwards,
        idleWave2 3.8s ease-in-out 4.85s infinite;
    }
    /* bar3: terpendek, paling BAWAH — posisi naik agar tetap dalam lingkaran */
    .bar3 {
      stroke-dasharray: 140; stroke-dashoffset: 140;
      animation:
        drawBar  0.55s ease        1.46s 1 forwards,
        wave3    1.7s  ease-in-out 1.75s 1 forwards,
        idleWave3 3.8s ease-in-out 5.1s  infinite;
    }

    @keyframes drawBar { to { stroke-dashoffset:0; } }

    /* entry wave */
    @keyframes wave1 {
      0%   { d:path("M28,72  Q100,44 172,72");  }
      30%  { d:path("M28,48  Q100,14 172,48");  }
      65%  { d:path("M28,78  Q100,52 172,78");  }
      100% { d:path("M28,72  Q100,44 172,72");  }
    }
    @keyframes wave2 {
      0%   { d:path("M42,100 Q100,74 158,100"); }
      30%  { d:path("M42,76  Q100,44 158,76");  }
      65%  { d:path("M42,106 Q100,82 158,106"); }
      100% { d:path("M42,100 Q100,74 158,100"); }
    }
    @keyframes wave3 {
      0%   { d:path("M60,128 Q100,106 140,128"); }
      30%  { d:path("M60,106 Q100,78  140,106"); }
      65%  { d:path("M60,134 Q100,114 140,134"); }
      100% { d:path("M60,128 Q100,106 140,128"); }
    }

    /* idle breathing */
    @keyframes idleWave1 {
      0%,100% { d:path("M28,72  Q100,44 172,72");  }
      50%     { d:path("M28,62  Q100,30 172,62");  }
    }
    @keyframes idleWave2 {
      0%,100% { d:path("M42,100 Q100,74 158,100"); }
      50%     { d:path("M42,90  Q100,60 158,90");  }
    }
    @keyframes idleWave3 {
      0%,100% { d:path("M60,128 Q100,106 140,128"); }
      50%     { d:path("M60,118 Q100,92  140,118"); }
    }

    /* ── teks ── */
    .text-wrap { display:flex; flex-direction:column; gap:0; }

    .spotify-label {
      font-family: 'Nunito','Helvetica Neue',Arial,sans-serif;
      font-size: 72px;
      font-weight: 900;
      color: #1DB954;
      letter-spacing: -1px;
      line-height: 1;
      opacity: 0;
      transform: translateX(-20px);
      animation:
        slideIn  0.7s cubic-bezier(.34,1.2,.64,1) 1.3s 1 forwards,
        textGlow 3s  ease-in-out                  3.5s  infinite;
    }
    .spotify-label sup { font-size:22px; font-weight:800; vertical-align:super; margin-left:2px; }

    @keyframes slideIn  { to { opacity:1; transform:translateX(0); } }
    @keyframes textGlow {
      0%,100% { text-shadow:0 0 20px #1DB95400; }
      50%     { text-shadow:0 0 30px #1DB95488, 0 0 60px #1DB95433; }
    }

    .tagline {
      font-family:'Nunito',Arial,sans-serif;
      font-size:13px; font-weight:800;
      color:#1DB95499;
      letter-spacing:5px; text-transform:uppercase;
      opacity:0; transform:translateY(6px);
      animation: tagIn 0.6s ease 2.2s 1 forwards;
    }
    @keyframes tagIn { to { opacity:1; transform:translateY(0); } }

    .eq-wrap {
      display:flex; align-items:flex-end;
      gap:4px; height:20px; margin-top:10px;
      opacity:0;
      animation: tagIn 0.5s ease 2.8s 1 forwards;
    }
    .eq-bar {
      width:4px; background:#1DB954; border-radius:2px;
      animation: eqBounce var(--spd) ease-in-out var(--dly) infinite alternate;
    }
    @keyframes eqBounce {
      from { height:3px;      opacity:0.35; }
      to   { height:var(--h); opacity:1;    }
    }
  </style>
</head>
<body>

  <div class="particles" id="particles"></div>

  <div class="logo-wrap">

    <!-- icon -->
    <div style="position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center;">
      <div class="halo"></div>

      <svg width="200" height="200" viewBox="0 0 200 200"
           xmlns="http://www.w3.org/2000/svg" overflow="visible"
           style="position:relative;z-index:1;">

        <!-- pulse rings -->
        <circle cx="100" cy="100" class="pulse-ring"  r="108"/>
        <circle cx="100" cy="100" class="pulse-ring2" r="108"/>
        <circle cx="100" cy="100" class="pulse-ring3" r="108"/>
        <circle cx="100" cy="100" class="idle-ring"   r="108"/>
        <circle cx="100" cy="100" class="idle-ring2"  r="108"/>

        <!-- circle -->
        <circle cx="100" cy="100" r="100" fill="#1DB954" class="circle-main"/>

        <!-- bar 1: terpanjang, ATAS -->
        <path class="bar1"
              d="M28,72 Q100,44 172,72"
              fill="none" stroke="#000" stroke-width="15" stroke-linecap="round"/>

        <!-- bar 2: tengah -->
        <path class="bar2"
              d="M42,100 Q100,74 158,100"
              fill="none" stroke="#000" stroke-width="15" stroke-linecap="round"/>

        <!-- bar 3: terpendek, BAWAH — y dinaikkan agar tidak terpotong -->
        <path class="bar3"
              d="M60,128 Q100,106 140,128"
              fill="none" stroke="#000" stroke-width="15" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- teks kanan -->
    <div class="text-wrap">
      <div class="spotify-label">Spotify<sup>®</sup></div>
      <div class="tagline">Music for everyone</div>
      <div class="eq-wrap" id="eq"></div>
    </div>

  </div>

  <script>
    /* particles */
    const pw = document.getElementById('particles');
    for (let i=0;i<28;i++){
      const d=document.createElement('div');
      d.className='dot';
      const s=Math.random()*5+2;
      d.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;top:${40+Math.random()*55}%;--dur:${3+Math.random()*4}s;--delay:${Math.random()*6}s;`;
      pw.appendChild(d);
    }

    /* equalizer */
    const eq=document.getElementById('eq');
    const H=[10,17,12,19,8,15,19,10,17,12];
    const S=[.6,.45,.7,.5,.65,.4,.55,.7,.45,.6];
    const D=[0,.15,.05,.2,.1,.25,.08,.18,.03,.22];
    H.forEach((h,i)=>{
      const b=document.createElement('div');
      b.className='eq-bar';
      b.style.cssText=`--h:${h}px;--spd:${S[i]}s;--dly:${D[i]}s;`;
      eq.appendChild(b);
    });
  </script>
</body>
</html>
